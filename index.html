<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CCTV Replacement Project — Funding Approval and Tendering Timeline</title>
  <link rel="stylesheet" href="styles.css">
  <script>try{if(sessionStorage.getItem('cctv-unlocked'))document.documentElement.classList.add('gate-unlocked')}catch(e){}</script>
</head>
<body>
  <button id="fs-toggle" class="fs-toggle" type="button" aria-label="Toggle fullscreen" title="Fullscreen presentation">
    <svg class="fs-ico fs-ico-expand" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <svg class="fs-ico fs-ico-exit" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
      <path d="M9 4v5H4M15 4v5h5M9 20v-5H4M15 20v-5h5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <div id="gate" class="gate">
    <form class="gate-card" id="gate-form" autocomplete="off">
      <div class="gate-lock" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="4" y="11" width="16" height="9" rx="2"/>
          <path d="M8 11V8a4 4 0 0 1 8 0v3"/>
        </svg>
      </div>
      <h2 class="gate-title">Restricted access</h2>
      <p class="gate-sub">Please enter the password to view this timeline.</p>
      <label class="gate-field">
        <span class="gate-label">Password</span>
        <input type="password" id="gate-input" class="gate-input" autocomplete="current-password" placeholder="Enter password" />
      </label>
      <p class="gate-error" id="gate-error" role="alert"></p>
      <button type="submit" class="gate-btn">Unlock</button>
    </form>
  </div>

  <div class="wrap">
    <header class="page">
      <h1>CCTV Replacement Project — <span class="muted">Funding Approval and Tendering Timeline</span></h1>
      <p class="lead">
        An overview of the project progress. Hover a dot for the event, or a ribbon for the duration.
      </p>
    </header>

    <details class="headline-wrap">
      <summary class="headline-summary">Key statistics</summary>
      <div id="headline" class="headline"></div>
    </details>

    <div id="legend" aria-label="Legend"></div>

    <div id="chart-host">
      <div id="tooltip" role="tooltip" aria-hidden="true"></div>
    </div>

    <details class="footnote">
      <summary>Remarks</summary>
      <div class="footnote-body"></div>
    </details>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
